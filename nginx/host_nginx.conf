# ilmiy-api.uzswlu.uz — HTTPS (universitet SSL sertifikati)
server {
    listen 443 ssl;
    server_name ilmiy-api.uzswlu.uz;

    ssl_certificate /etc/ssl/uzswlu/ilmiy-api.uzswlu.uz.crt;
    ssl_certificate_key /etc/ssl/uzswlu/ilmiy-api.uzswlu.uz.key;

    # SSL xavfsizlik sozlamalari
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    # Barcha so'rovlarni Docker Nginx ga proxy qilish
    location / {
        proxy_pass http://127.0.0.1:81;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
