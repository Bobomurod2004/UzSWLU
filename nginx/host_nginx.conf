# ilmiy-api.uzswlu.uz — faqat HTTPS (port 80 boshqa dasturga tegishli)
server {
    listen 443 ssl;
    server_name ilmiy-api.uzswlu.uz;

    ssl_certificate /etc/letsencrypt/live/ilmiy-api.uzswlu.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ilmiy-api.uzswlu.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    # Barcha so'rovlarni Docker Nginx ga proxy qilish
    location / {
        proxy_pass http://127.0.0.1:81;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
